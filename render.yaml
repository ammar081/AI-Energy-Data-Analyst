services:
  - type: web
    name: ammar081-energy-analyst-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ammar081-energy-analyst-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://ammar081-energy-analyst.onrender.com
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: ALLOW_SELF_REGISTRATION
        value: true
      - key: CELERY_TASK_ALWAYS_EAGER
        value: true

  - type: web
    name: ammar081-energy-analyst
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./frontend/Dockerfile
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ammar081-energy-analyst-api.onrender.com/api

databases:
  - name: ammar081-energy-analyst-db
    plan: free
    region: frankfurt
    databaseName: energy_analytics
    user: energy_analyst
